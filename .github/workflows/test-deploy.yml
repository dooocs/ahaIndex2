name: Test Deploy (Staging)

on:
  workflow_dispatch:  # 只能手动触发，不会被 repository_dispatch 误触发

jobs:
  test-deploy:
    runs-on: ubuntu-latest
    env:
      STAGING_PREFIX: __test__  # 集中管理，方便改
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Install ossutil
        run: |
          curl -Lo ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.2.1/ossutil-2.2.1-linux-amd64.zip
          unzip ossutil.zip
          chmod +x ossutil-2.2.1-linux-amd64/ossutil
          sudo mv ossutil-2.2.1-linux-amd64/ossutil /usr/local/bin/ossutil

      - name: Clean previous staging
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: https://oss-cn-hangzhou.aliyuncs.com
          OSS_REGION: cn-hangzhou
        run: |
          CREDS="--endpoint $OSS_ENDPOINT --access-key-id $OSS_ACCESS_KEY_ID --access-key-secret $OSS_ACCESS_KEY_SECRET --region $OSS_REGION"
          # 删除上次 test 残留，避免新版本漏传却被旧文件假装通过
          ossutil rm oss://amazingindex/$STAGING_PREFIX/ --recursive --force $CREDS || true
          echo "✅ 清理完成"

      - name: Deploy to OSS (staging)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: https://oss-cn-hangzhou.aliyuncs.com
          OSS_REGION: cn-hangzhou
        run: |
          CREDS="--endpoint $OSS_ENDPOINT --access-key-id $OSS_ACCESS_KEY_ID --access-key-secret $OSS_ACCESS_KEY_SECRET --region $OSS_REGION"

          START=$(date +%s)

          # 1. _astro 长缓存
          ossutil sync ./dist/_astro/ oss://amazingindex/$STAGING_PREFIX/_astro/ \
            --force -j 20 \
            --metadata "Cache-Control=max-age=31536000,immutable" \
            $CREDS &
          PID_ASTRO=$!

          # 2. HTML 文件
          mkdir -p /tmp/html-stage
          rsync -a --include='*/' --include='*.html' --exclude='*' \
            --exclude='_astro/***' \
            ./dist/ /tmp/html-stage/

          ossutil sync /tmp/html-stage/ oss://amazingindex/$STAGING_PREFIX/ \
            --force -j 20 \
            --metadata "Cache-Control=no-cache" \
            --metadata "Content-Type=text/html; charset=utf-8" \
            $CREDS &
          PID_HTML=$!

          # 3. 其他静态文件（robots/favicon/sitemap）
          ossutil sync ./dist/ oss://amazingindex/$STAGING_PREFIX/ \
            --force -j 10 \
            --exclude "*.html" \
            --exclude "_astro/*" \
            $CREDS &
          PID_REST=$!

          wait $PID_ASTRO $PID_HTML $PID_REST

          # 4. bare URL：用 OSS 内部复制实现
          ossutil ls oss://amazingindex/$STAGING_PREFIX/ -s --recursive $CREDS \
            | grep '/index.html$' \
            | grep -v "^oss://amazingindex/$STAGING_PREFIX/index.html$" \
            | sed "s|^oss://amazingindex/||" \
            | while read key; do
                dst="${key%/index.html}"
                ossutil cp "oss://amazingindex/$key" "oss://amazingindex/$dst" \
                  --force \
                  --metadata "Cache-Control=no-cache" \
                  --metadata "Content-Type=text/html; charset=utf-8" \
                  $CREDS &
                if [ $(jobs -r | wc -l) -ge 20 ]; then wait -n; fi
              done
          wait

          END=$(date +%s)
          echo "✅ 上传完成，耗时 $((END-START))s"

      - name: Verify staging upload
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: https://oss-cn-hangzhou.aliyuncs.com
          OSS_REGION: cn-hangzhou
        run: |
          CREDS="--endpoint $OSS_ENDPOINT --access-key-id $OSS_ACCESS_KEY_ID --access-key-secret $OSS_ACCESS_KEY_SECRET --region $OSS_REGION"

          LOCAL_HTML=$(find ./dist -name "*.html" | wc -l)
          REMOTE_HTML=$(ossutil ls oss://amazingindex/$STAGING_PREFIX/ -s --recursive $CREDS | grep -c '\.html$' || echo 0)
          # 远端会多出 bare URL 副本（约等于本地 index.html 数量）
          BARE_COUNT=$(find ./dist -name "index.html" -not -path "./dist/index.html" | wc -l)
          EXPECTED=$((LOCAL_HTML + BARE_COUNT))

          echo "本地 HTML: $LOCAL_HTML"
          echo "远端 HTML: $REMOTE_HTML"
          echo "预期 bare 副本: $BARE_COUNT"
          echo "预期总数: $EXPECTED"

          if [ "$REMOTE_HTML" -lt "$EXPECTED" ]; then
            echo "❌ 远端 HTML 数量少于预期，可能有漏传"
            exit 1
          fi
          echo "✅ HTML 数量校验通过"
